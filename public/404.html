<!doctype html>
<html lang="fr">
<head>
  <title>Page introuvable - Dalloway</title>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1, width=device-width">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="/icon.png?v=2" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #dbe4ff 0%, #ebe5ff 50%, #f5f3ff 100%);
      font-family: "Nunito", sans-serif;
      color: #1f2937;
    }

    .error-card {
      text-align: center;
      background: #fff;
      border: 2px solid rgba(13, 110, 253, 0.15);
      border-radius: 24px;
      box-shadow: 0 6px 28px rgba(30, 30, 30, 0.15), 0 3px 12px rgba(30, 30, 30, 0.08);
      padding: 60px 48px;
      max-width: 520px;
      width: 90%;
    }

    .error-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.1), rgba(124, 58, 237, 0.08));
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      font-size: 32px;
      color: #7C3AED;
    }

    .error-code {
      font-size: 72px;
      font-weight: 800;
      letter-spacing: -3px;
      background: linear-gradient(135deg, #2563EB, #7C3AED);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 12px;
    }

    .error-title {
      font-size: 22px;
      font-weight: 800;
      color: #1f2937;
      margin-bottom: 12px;
    }

    .error-desc {
      font-size: 15px;
      color: #6b7280;
      line-height: 1.7;
      margin-bottom: 32px;
    }

    .error-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 32px;
      background: linear-gradient(135deg, #2563EB, #7C3AED);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      font-family: "Nunito", sans-serif;
      border: none;
      border-radius: 14px;
      text-decoration: none;
      cursor: pointer;
      box-shadow: 0 6px 28px rgba(124, 58, 237, 0.25);
      transition: all 0.2s;
    }

    .error-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(124, 58, 237, 0.35);
      color: #fff;
    }

    @media (max-width: 480px) {
      .error-card { padding: 40px 24px; }
      .error-code { font-size: 56px; }
      .error-title { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="error-card">
    <div class="error-icon">
      <i class="fa-solid fa-compass"></i>
    </div>
    <div class="error-code">404</div>
    <h1 class="error-title">Oups, cette page n'existe pas</h1>
    <p class="error-desc">
      On dirait que vous vous etes aventure hors du chemin.
      La page que vous cherchez a peut-etre ete deplacee ou n'a jamais existe.
    </p>
    <a href="/" class="error-btn">
      <i class="fa-solid fa-house"></i> Retour a l'accueil
    </a>
  </div>
</body>
</html>
